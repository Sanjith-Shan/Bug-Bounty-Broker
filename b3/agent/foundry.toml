[profile.default]
src = "contracts"
test = "exploits"
out = "out"
libs = ["lib"]
solc_version = "0.8.24"
optimizer = true
optimizer_runs = 200
verbosity = 4
fuzz = { runs = 64 }

[profile.verify]
# Used by the exploit_verifier service. Higher verbosity, JSON output.
verbosity = 5

[rpc_endpoints]
mainnet      = "${MAINNET_RPC_URL}"
base         = "${BASE_RPC_URL}"
base_sepolia = "${BASE_SEPOLIA_RPC_URL}"
polygon      = "${POLYGON_RPC_URL}"
